groups:
  - name: tavern-alerts
    rules:
      - alert: TavernApiDown
        expr: up{job="observabilite-advanced-tutorial"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "La taverne ne repond plus"
          description: "Le scrape Prometheus vers l'API Quarkus echoue depuis 30s."

      - alert: TavernOrderLatencyP95High
        expr: histogram_quantile(0.95, sum(rate(tavern_advanced_order_seconds_bucket[2m])) by (le)) > 0.5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Latence p95 des commandes trop elevee"
          description: "La latence p95 de tavern.advanced.order depasse 500 ms depuis 1 minute."
