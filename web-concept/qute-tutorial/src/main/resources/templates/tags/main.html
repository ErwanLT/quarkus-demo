<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{title} - The Falling Whale</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #2c1810; --paper: #f4e4bc; }
        body { margin: 0; padding: 0; font-family: 'EB Garamond', serif; background: radial-gradient(1200px 600px at 50% -200px, #6b533f 0%, #3f2b1f 55%, #2a1a12 100%); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        nav { width: 100%; max-width: 800px; margin-top: 2rem; display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap; }
        nav a { font-family: 'MedievalSharp', cursive; color: #f4e4bc; text-decoration: none; font-size: 1.2rem; border-bottom: 2px solid transparent; padding: 5px 10px; transition: all 0.3s; }
        nav a:hover { color: #ffd700; border-bottom: 2px solid #ffd700; }
        .parchment { width: 90%; max-width: 800px; background-color: var(--paper); background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png'); padding: 3rem; margin: 2rem 0; box-shadow: 0 0 50px rgba(0,0,0,0.8); border-radius: 5px; position: relative; border: 2px solid #8b4513; min-height: 400px; }
        header { text-align: center; margin-bottom: 2rem; border-bottom: 2px solid rgba(139, 69, 19, 0.4); padding-bottom: 1rem; }
        h1 { font-family: 'MedievalSharp', cursive; font-size: 2.5rem; margin: 0; color: #5d3a1a; }
        footer { margin-top: auto; padding: 2rem; text-align: center; color: #8b4513; font-family: 'MedievalSharp', cursive; width: 100%; }
        .wax-seal { position: absolute; bottom: 20px; right: 20px; width: 60px; height: 60px; background: #8b0000; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #ffd700; font-size: 1.5rem; transform: rotate(-15deg); border: 2px solid #5d0000; z-index: 10; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #8b4513; background: rgba(255,255,255,0.5); font-family: 'EB Garamond', serif; font-size: 1.1rem; box-sizing: border-box; }
        button { background: #5d3a1a; color: white; cursor: pointer; font-family: 'MedievalSharp', cursive; border: none; font-size: 1.3rem; }
        button:hover { background: #8b4513; }
        .error-box { background: rgba(255, 235, 235, 0.9); border: 1px solid #b22222; color: #5d0000; padding: 0.8rem 1rem; margin-bottom: 1.2rem; border-radius: 4px; }
        .error-text { color: #b22222; font-size: 0.95rem; margin-top: -6px; margin-bottom: 8px; }
    </style>
</head>
<body>
    <nav>
        <a href="/tavern-web">Accueil</a>
        <a href="/tavern-web/drinks">Boissons</a>
        <a href="/tavern-web/food">Nourriture</a>
        <a href="/tavern-web/booking">Dormir</a>
        <a href="/tavern-web/admin">Registre</a>
    </nav>
    <div class="parchment">
        <header>
            <h1>The Falling Whale</h1>
            <h2 style="font-family: 'MedievalSharp'; font-size: 1.5rem; color: #8b4513; margin-top: 0.5rem;">{title}</h2>
        </header>
        
        {nested-content}

        <div class="wax-seal">42</div>
    </div>
    <footer>
        "Par la grâce du Cachalot et du Pot de Fleurs"
    </footer>
</body>
</html>
