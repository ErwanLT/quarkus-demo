# Configuration pour le tutoriel Qute & Persistance
quarkus.http.port=8082
quarkus.application.name=web-concept-qute-tutorial

# Configuration Database (H2 en mémoire pour la démo)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:tavern;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=drop-and-create

# Afficher les logs SQL pour voir ce qui se passe sous le capot
quarkus.hibernate-orm.log.sql=true
