# =============================================================
# Configuration Quarkus — Taverne i18n
# =============================================================

# --- Serveur ---
quarkus.http.port=8080

# --- i18n : locale par défaut et langues supportées ---
# La locale par défaut est utilisée quand Accept-Language est absent
# ou contient uniquement le wildcard "*"
quarkus.default-locale=fr-FR

# Déclarer toutes les locales supportées permet à Quarkus de
# valider les fichiers .properties à la compilation
quarkus.locales=fr-FR,en-US,de-DE,es-ES,la-LA

# --- Logs ---
quarkus.log.level=INFO
quarkus.log.category."fr.eletutour".level=DEBUG
